<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>My Templates</title>
<style>
body {
  font-family: Arial, sans-serif;
  max-width: 900px;
  margin: auto;
  padding: 20px;
}
h1 {
  text-align: center;
}
.section {
  border: 1px solid #ddd;
  padding: 10px;
  margin-bottom: 15px;
}
</style>
</head>
<body>

<h1>My Call Center Templates</h1>

<div class="section">
<h2>Greeting</h2>
<p>Thank you for calling. My name is William. How may I assist you today?</p>
</div>

<div class="section">
<h2>Membership Offer</h2>
<p>Today I can offer you a free trial membership so you can experience all the benefits before making a commitment.</p>
</div>

<div class="section">
<h2>Closing</h2>
<p>Thank you for your time. Have a wonderful day.</p>
</div>

</body>
</html>
